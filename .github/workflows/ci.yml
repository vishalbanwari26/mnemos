name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/mnemos-neo4j
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p mnemos-neo4j 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest -q
        # Postgres/Qdrant tests use testcontainers (needs Docker, available by
        # default on GitHub-hosted runners); Neo4j contract tests use the
        # service container above and skip gracefully if it isn't reachable.

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
